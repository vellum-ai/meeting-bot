<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meeting Bot</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: Canvas;
      color: CanvasText;
    }
    .app { max-width: 820px; margin: 0 auto; padding: 24px 20px 64px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    h2 { font-size: 16px; margin: 32px 0 12px; }
    .sub { opacity: 0.7; margin: 0 0 8px; }
    .card {
      border: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
    .row label { flex: 1; }
    select { font: inherit; padding: 6px 8px; border-radius: 6px; }
    button {
      font: inherit; font-weight: 600; cursor: pointer;
      padding: 8px 16px; border-radius: 8px; border: 0;
      background: color-mix(in srgb, CanvasText 88%, Canvas); color: Canvas;
      margin-top: 12px;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .status { margin-left: 12px; font-size: 13px; opacity: 0.8; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      text-align: left; padding: 8px 10px;
      border-bottom: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
      vertical-align: top;
    }
    th { font-weight: 600; opacity: 0.7; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .url { word-break: break-all; }
    .empty { opacity: 0.6; padding: 16px 2px; }
    .readonly {
      margin-top: 16px; padding-top: 12px;
      border-top: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
    }
    .readonly-title { font-size: 13px; font-weight: 600; opacity: 0.7; margin-bottom: 6px; }
    dl { margin: 0; }
    .dl-row { display: flex; gap: 12px; padding: 5px 0; }
    dt { flex: 0 0 160px; opacity: 0.7; }
    dd { margin: 0; word-break: break-all; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
