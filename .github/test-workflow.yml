name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The plugin's own suites and the unified typecheck.
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: |
          bun install
          (cd src/vellum/meet/bot && bun install)
          (cd src/vellum/meet/meet-controller-ext && bun install)
      - name: Typecheck (unified program, vendored tree included)
        run: bunx tsc --noEmit
      - name: Typecheck skill scripts
        run: >-
          bunx tsc --noEmit --strict --allowImportingTsExtensions
          --moduleResolution bundler --module ESNext --target ESNext
          --types bun --skipLibCheck --noUncheckedIndexedAccess
          skills/meeting-bot/scripts/*.ts
      - name: Test (plugin suites)
        run: bun test

  # The vendored Vellum Runtime suites (src/vellum/meet). They pass in a bare
  # environment (suites needing Docker or a live Meet self-skip), so this job
  # is blocking. Remaining TODO: fold them into the default `bun test` run and
  # retire the bunfig scoping (see bunfig.toml).
  vellum-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: |
          bun install
          (cd src/vellum/meet/bot && bun install)
          (cd src/vellum/meet/meet-controller-ext && bun install)
      - name: Test (vendored Vellum Runtime suites)
        run: bun test ./src/vellum/meet

# NOTE: this file belongs at .github/workflows/test.yml. It is parked here
# because the automation token that opened this PR lacks the `workflow` scope
# required to push files under .github/workflows/. Activate it with:
#   git mv .github/test-workflow.yml .github/workflows/test.yml
