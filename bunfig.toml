# Scope the default `bun test` run to the plugin's own suites. The vendored
# Vellum Runtime tree under src/vellum/meet carries its own tests (including
# Docker and live-meeting e2e suites that need a browser stack); run those
# explicitly with `bun test src/vellum/meet/...` when working on that tree.
# CI runs the vendored suites in the non-blocking vellum-runtime job of
# .github/workflows/test.yml. TODO: stabilize them, fold the hermetic ones
# into this default run, and delete this file.
[test]
root = "src/__tests__"
